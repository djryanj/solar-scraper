###
# Name: enable-qemu-arm.yaml
# Type: step
# Purpose: Enables the x86_64 build agent that this step runs on to compile aarch64/arm64v8 images
# Notes: 
# - The change made by this step will only be accessible within a single job (not even within a single stage). You may need to call it multiple times.
# Parameters:
# None.
###

steps:
  - bash: |
      echo " ==> Enable aarch64/arm64v8 builds"
      # register QEMU binary
      docker run --rm --privileged multiarch/qemu-user-static --reset -p yes
    displayName: "Enable aarch64/arm64v8 builds"

