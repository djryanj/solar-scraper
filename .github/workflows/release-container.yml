name: Release Container

on:
  release:
    types:
      - published

permissions:
  contents: read
  packages: write

concurrency:
  group: release-container-${{ github.event.release.tag_name }}
  cancel-in-progress: false

env:
  IMAGE_NAME: solar-scraper

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Normalize image coordinates
        run: |
          echo "IMAGE_REGISTRY=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_ENV"
          echo "IMAGE_REPOSITORY=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/${IMAGE_NAME}" >> "$GITHUB_ENV"

      - name: Check out repository at release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Generate release metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_REPOSITORY }}
          tags: |
            type=semver,pattern={{version}},value=${{ github.event.release.tag_name }}
            type=semver,pattern={{major}}.{{minor}},value=${{ github.event.release.tag_name }}
            type=semver,pattern={{major}},value=${{ github.event.release.tag_name }}
            type=raw,value=latest
          labels: |
            org.opencontainers.image.title=solar-scraper
            org.opencontainers.image.description=APSolar ECU Prometheus exporter
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.version=${{ github.event.release.tag_name }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Build and push release image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          build-args: |
            GIT_SHA=${{ github.sha }}
            GIT_REF=${{ github.event.release.tag_name }}
            RELEASE_VERSION=${{ github.event.release.tag_name }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=release-container
          cache-to: type=gha,mode=max,scope=release-container

      - name: Write workflow summary
        run: |
          echo "## Release container" >> "$GITHUB_STEP_SUMMARY"
          echo "Published release tags for ${IMAGE_REPOSITORY}." >> "$GITHUB_STEP_SUMMARY"
          echo "Release: ${{ github.event.release.tag_name }}" >> "$GITHUB_STEP_SUMMARY"